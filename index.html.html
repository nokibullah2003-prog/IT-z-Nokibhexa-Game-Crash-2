<script>
const grid=document.getElementById('grid'),q=document.getElementById('q'),cats=document.getElementById('cats'),dancer=document.getElementById('dancer');
let active='All',query='';
function filter(){[...grid.children].forEach(c=>{const t=c.querySelector('h3').textContent.toLowerCase()+' '+c.querySelector('p').textContent.toLowerCase();const cat=c.querySelector('.cat').textContent;c.style.display=((active==='All'||cat===active)&&(!query||t.includes(query)))?'':'none'})}
q.addEventListener('input',e=>{query=e.target.value.toLowerCase();filter()});
cats.addEventListener('click',e=>{if(e.target.tagName==='BUTTON'){[...cats.children].forEach(b=>b.classList.remove('on'));e.target.classList.add('on');active=e.target.dataset.cat;filter()}});
grid.addEventListener('click',e=>{const c=e.target.closest('.card');if(c){window.open(c.dataset.url,'_blank','noopener,noreferrer')}});
let t;window.addEventListener('scroll',()=>{dancer.classList.add('dancing');clearTimeout(t);t=setTimeout(()=>dancer.classList.remove('dancing'),800)},{passive:true});
// Source protection
document.addEventListener('contextmenu',function(e){e.preventDefault()});
document.addEventListener('keydown',function(e){var k=e.key.toLowerCase();if(e.ctrlKey&&['u','s','p'].includes(k)){e.preventDefault();return false;}if(e.ctrlKey&&e.shiftKey&&['i','j','c'].includes(k)){e.preventDefault();return false;}if(k==='f12'){e.preventDefault();return false;}});
</script></body></html>
